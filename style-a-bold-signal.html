<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style A: Bold Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
html{font-size:clamp(18px,calc(14px + 0.35vw + 0.2vh),26px);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#fff;font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.container{display:grid;grid-template-columns:1fr 1fr;gap:clamp(1rem,3vw,3rem);padding:clamp(2rem,5vw,5rem);width:100%;max-width:1400px;align-items:center}
.left{display:flex;flex-direction:column;gap:clamp(0.8rem,2vh,1.5rem)}
.tag{font-size:clamp(0.85rem,1.2vw,1rem);text-transform:uppercase;letter-spacing:0.15em;color:#999;font-weight:500}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2.5rem,5.5vw,5rem);line-height:0.95;color:#fff}
h1 span{color:#FF5722}
.subtitle{font-size:clamp(1rem,1.5vw,1.25rem);color:#aaa;line-height:1.5;max-width:500px}
.card{background:#FF5722;border-radius:clamp(12px,2vw,24px);padding:clamp(2rem,4vw,4rem);display:flex;flex-direction:column;justify-content:flex-end;gap:clamp(0.5rem,1vh,1rem);min-height:clamp(250px,40vh,450px);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-50%;right:-30%;width:80%;height:80%;background:radial-gradient(circle,rgba(255,255,255,0.15) 0%,transparent 70%);border-radius:50%}
.card-number{font-family:'Archivo Black',sans-serif;font-size:clamp(4rem,10vw,10rem);color:rgba(26,26,26,0.15);position:absolute;top:clamp(0.5rem,2vw,1rem);right:clamp(1rem,3vw,2rem);line-height:1}
.card-text{color:#1a1a1a;font-size:clamp(1rem,1.3vw,1.15rem);font-weight:500;line-height:1.5;position:relative;z-index:1}
.card-label{color:rgba(26,26,26,0.6);font-size:clamp(0.85rem,1vw,1rem);text-transform:uppercase;letter-spacing:0.1em;position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.left{animation:fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both}
.card{animation:fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both}
@media(max-width:800px){.container{grid-template-columns:1fr;text-align:center}.subtitle{margin:0 auto}.card{min-height:200px}}
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <div class="tag">Sunlight Holdings</div>
    <h1>The Value<br><span>Loop.</span></h1>
    <p class="subtitle">How humans and non-human intelligence structure collaboration to produce the specific kind of value a given output demands.</p>
  </div>
  <div class="card">
    <div class="card-number">01</div>
    <div class="card-label">Core Principle</div>
    <div class="card-text">Define what valuable means. Structure the collaboration. Evaluate. Recalibrate. Repeat.</div>
  </div>
</div>
</body>
</html>
