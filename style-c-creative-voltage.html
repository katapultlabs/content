<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style C: Creative Voltage</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html{font-size:clamp(18px,calc(14px + 0.35vw + 0.2vh),26px);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;overflow:hidden;display:flex}
.left{background:#0066ff;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(2rem,4vw,4rem);position:relative;overflow:hidden}
.left::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 70%,rgba(212,255,0,0.1) 0%,transparent 60%)}
.right{background:#1a1a2e;flex:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(2rem,4vw,4rem);position:relative}
.grid-pattern{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px}
.tag{font-family:'Space Mono',monospace;font-size:clamp(0.85rem,1vw,1rem);color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:clamp(1rem,3vh,2rem)}
h1{font-family:'Syne',sans-serif;font-size:clamp(3rem,6vw,5.5rem);font-weight:800;line-height:0.95;color:#fff}
.neon{display:inline-block;color:#d4ff00;position:relative}
.neon::after{content:'';position:absolute;bottom:-4px;left:0;width:100%;height:3px;background:#d4ff00;box-shadow:0 0 12px rgba(212,255,0,0.5)}
.right-content{position:relative;z-index:1;display:flex;flex-direction:column;gap:clamp(1.5rem,3vh,2.5rem)}
.subtitle{font-family:'Space Mono',monospace;font-size:clamp(1rem,1.2vw,1.1rem);color:rgba(255,255,255,0.7);line-height:1.7;max-width:500px}
.badge{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(212,255,0,0.12);border:1px solid rgba(212,255,0,0.3);border-radius:100px;padding:clamp(0.4rem,0.8vh,0.6rem) clamp(0.8rem,1.5vw,1.2rem);font-family:'Space Mono',monospace;font-size:clamp(0.85rem,1vw,0.95rem);color:#d4ff00;width:fit-content}
.badge::before{content:'→';font-weight:700}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.tag{animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both}
h1{animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both}
.subtitle{animation:slideRight 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both}
.badge{animation:slideRight 0.7s cubic-bezier(0.16,1,0.3,1) 0.6s both}
@media(max-width:800px){body{flex-direction:column}.left,.right{flex:none;min-height:50vh}}
</style>
</head>
<body>
<div class="left">
  <div class="tag">Sunlight Holdings</div>
  <h1>The Value<br><span class="neon">Loop</span></h1>
</div>
<div class="right">
  <div class="grid-pattern"></div>
  <div class="right-content">
    <p class="subtitle">How humans and non-human intelligence structure collaboration to produce the specific kind of value a given output demands.</p>
    <div class="badge">Building the machine that builds the machine</div>
  </div>
</div>
</body>
</html>
